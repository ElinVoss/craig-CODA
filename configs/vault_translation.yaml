phase_name: Context Intelligence Phase
source_roots:
  - path: data/clean/conversation_exports/markdown_export_raw/threads
    enabled: true
    recursive: true
    source_kind: conversation_transcript
    tags:
      - conversations
      - transcript
      - chatgpt
    include_extensions:
      - .txt
  - path: data/raw/examples
    enabled: true
    recursive: true
    source_kind: curated_memory
    tags:
      - examples
      - vault_seed
    include_extensions:
      - .txt
      - .md
      - .jsonl
      - .yaml
      - .yml
  - path: exports/user_model_package/identity_core
    enabled: true
    recursive: true
    source_kind: runtime_bundle
    tags:
      - identity
      - stable
    include_extensions:
      - .txt
      - .md
      - .yaml
      - .yml
  - path: exports/user_model_package/project_constraints
    enabled: true
    recursive: true
    source_kind: runtime_bundle
    tags:
      - constraints
      - runtime
    include_extensions:
      - .txt
      - .md
      - .yaml
      - .yml
  - path: exports/user_model_package/style_training
    enabled: true
    recursive: true
    source_kind: runtime_bundle
    tags:
      - style
      - voice
    include_extensions:
      - .txt
      - .md
      - .jsonl
  - path: exports/user_model_package/review_before_use
    enabled: false
    recursive: true
    source_kind: review_bundle
    tags:
      - review_only
    include_extensions:
      - .txt
      - .md
      - .jsonl
      - .yaml
      - .yml
artifact_outputs:
  nodes_path: artifacts/vault/nodes.jsonl
  edges_path: artifacts/vault/edges.jsonl
  index_report_dir: artifacts/vault/index_reports
  runtime_context_dir: artifacts/memory/runtime_context
  translation_dir: artifacts/translation
runtime_context:
  max_items: 5
  max_chars: 1800
  max_summary_chars: 220
