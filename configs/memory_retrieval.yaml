phase_name: Context Intelligence Phase
artifacts:
  nodes_path: artifacts/vault/nodes.jsonl
  edges_path: artifacts/vault/edges.jsonl
  index_report_dir: artifacts/vault/index_reports
  runtime_context_dir: artifacts/memory/runtime_context
  consolidation_report_dir: artifacts/memory/consolidation_reports
retrieval:
  strategy: spreading_activation
  fallback_strategy: flat_top_k
  # Options: lexical_overlap | embedding
  # Switch to embedding once artifacts/embeddings/all-MiniLM-L6-v2 is downloaded.
  # Embedding gracefully falls back to lexical_overlap if the model path does not exist.
  semantic_method: embedding
  embedding_model_path: artifacts/embeddings/all-MiniLM-L6-v2
  # Per-profile trust bias overrides — applied after base trust_layer_bias.
  # Use to lift layers that are penalized globally but should be visible in specific profiles.
  profile_trust_bias_overrides:
    critique:
      interpretive_maps: 0.90
  default_top_k: 5
  max_top_k: 8
  temporal_half_life_days: 180
  interpretive_penalty: 0.45
  prose_runtime_cap: 0.85
  review_only_action: exclude
  allowed_runtime_layers:
    - stable_core
    - project_constraints
    - episodic_events
    - prose_voice
  allowed_training_layers:
    - stable_core
    - project_constraints
    - episodic_events
    - prose_voice
  trust_layer_bias:
    stable_core: 1.0
    project_constraints: 0.95
    episodic_events: 0.85
    prose_voice: 0.78
    interpretive_maps: 0.35
    review_only: 0.0
  spreading_activation:
    enabled: true
    seed_limit: 8
    min_seed_score: 0.18
    max_hops: 2
    fanout_cap: 4
    activation_decay: 0.72
    min_edge_weight: 0.45
    min_activation: 0.08
    max_total_activation: 1.0
    edge_type_bias:
      shared_project: 1.0
      shared_link: 0.95
      shared_tag: 0.72
      same_source: 0.0
  lexical_stopwords:
    - a
    - an
    - and
    - are
    - as
    - at
    - be
    - by
    - for
    - from
    - how
    - in
    - is
    - it
    - of
    - on
    - or
    - that
    - the
    - this
    - to
    - what
    - with
consolidation:
  reinforcement_threshold: 3
  report_limit: 25
