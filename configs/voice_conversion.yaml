# Voice Conversion Configuration
# Controls which books get converted, via which provider, at what chunk size.

output_dir: data/raw/converted
progress_file: data/raw/converted/.progress.jsonl
chunk_words: 700        # target words per API call
max_retries: 3
retry_delay: 5          # seconds between retries

# Gutenberg plain-text mirror (no registration required)
gutenberg_mirror: https://www.gutenberg.org/files/{id}/{id}-0.txt

books:
  # --- OpenAI GPT-4o batch ---
  - id: moby_dick
    title: "Moby Dick"
    author: "Herman Melville"
    gutenberg_id: 2701
    gutenberg_url: https://www.gutenberg.org/files/2701/2701-0.txt
    provider: openai
    model: gpt-4o

  - id: walden
    title: "Walden"
    author: "Henry David Thoreau"
    gutenberg_id: 205
    gutenberg_url: https://www.gutenberg.org/files/205/205-0.txt
    provider: openai
    model: gpt-4o

  - id: douglass_autobiography
