model_name: tiny-qwen3-scratch
architecture_family: qwen3-random-init
vocab_size_source: tokenizer_artifacts
vocab_size: null
tokenizer_dir: artifacts/tokenizers/default
hidden_size: 768
intermediate_size: 2048
num_hidden_layers: 12
num_attention_heads: 12
num_key_value_heads: 4
head_dim: 64
max_position_embeddings: 2048
hidden_act: silu
rms_norm_eps: 1.0e-6
tie_word_embeddings: false
attention_dropout: 0.0
initializer_range: 0.02
use_cache: true
pad_token_fallback: "[PAD]"
bos_token_fallback: "[BOS]"
eos_token_fallback: "[EOS]"
metadata_output: artifacts/models/tiny-qwen3-scratch/model_metadata.json
notes:
  - Scaled from smoke-test (512/8L/8H, 25M params) to research-capable (768/12L/12H, ~90M params).
  - Vocab upgraded from 96-token WordLevel to 4096-token BPE trained on personal corpus.
  - CPU-feasible: float32 training footprint approximately 1.5 GB RAM.
  - Uses Qwen3Config plus AutoModelForCausalLM.from_config with random weights.


