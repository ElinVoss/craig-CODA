required_fields:
  - id
  - node_type
  - trust_layer
  - content
  - summary
  - source_path
  - source_kind
  - created_at
  - time_start
  - time_end
  - life_phase
  - people
  - projects
  - tags
  - links
  - confidence
  - privacy_level
  - reinforcement_count
  - voice_score
  - reasoning_score
  - prose_score
  - project_relevance
  - extracted_from
extracted_from_schema:
  nullable: true
  description: Optional provenance metadata for capability nodes mined from GGUF tensors.
  required_if_present:
    - model_name
    - tensor_name
    - activation_pattern
    - mined_at
  optional_if_present:
    - model_file          # filename of the source GGUF
    - layer_index
    - head_index
    - component_type      # "attention_head", "mlp_neuron", "residual_stream"
    - extraction_method   # "heuristic", "activation_probing", "TransformerLens", etc.
    - extraction_confidence  # 0.0-1.0; how clean was the capability attribution
    - polysemantic        # bool; does this head serve multiple functions?
    - polysemantic_roles  # list[str] | null; candidate roles if polysemantic is true
    - miner_version
  notes:
    - polysemantic is critical — most transformer heads activate for multiple tasks.
    - Nodes with polysemantic=true should default to trust_layer=interpretive_maps.
    - Nodes with polysemantic=false and extraction_confidence >= 0.7 may be promoted to stable_core.
    - For human-authored nodes, set extracted_from to null.
trust_layers:
  stable_core:
    runtime_eligible: true
    training_eligible: true
    notes: Stable identity and durable operating truths.
  project_constraints:
    runtime_eligible: true
    training_eligible: true
    notes: Project rules, domain constraints, and operating limits.
  episodic_events:
    runtime_eligible: true
    training_eligible: selective
    notes: Event memories that can guide runtime recall but should not dominate weights.
  prose_voice:
    runtime_eligible: true
    training_eligible: prose_only
    notes: Voice and stylistic material for mode-specific expression.
  interpretive_maps:
    runtime_eligible: reference_only
    training_eligible: false
    notes: Interpretive or analytical frames that are not stable truth.
  review_only:
    runtime_eligible: false
    training_eligible: false
    notes: Private or review-only material that must never auto-load.
path_rules:
  - contains: review_only
    trust_layer: review_only
    node_type: review_note
    privacy_level: restricted
  - contains: review_before_use
    trust_layer: review_only
    node_type: review_note
    privacy_level: restricted
  - contains: identity_core
    trust_layer: stable_core
    node_type: identity_note
    privacy_level: standard
  - contains: project_constraints
    trust_layer: project_constraints
    node_type: constraint_note
    privacy_level: standard
  - contains: episodic_events
    trust_layer: episodic_events
    node_type: event_note
    privacy_level: standard
  - contains: conversation_exports
    trust_layer: episodic_events
    node_type: conversation_record
    privacy_level: restricted
  - contains: markdown_export_raw
    trust_layer: episodic_events
    node_type: conversation_record
    privacy_level: restricted
  - contains: prose_voice
    trust_layer: prose_voice
    node_type: prose_fragment
    privacy_level: standard
  - contains: interpretive_maps
    trust_layer: interpretive_maps
    node_type: interpretive_note
    privacy_level: internal
content_rules:
  interpretive_markers:
    - "hypothesis:"
    - "interpretation:"
    - "possible meaning:"
    - "pattern read:"
  review_markers:
    - review only
    - do not auto-load
    - private
